# Project-wide rustfmt configuration (stable `rustfmt` from `rust-toolchain.toml`).

edition = "2021"
max_width = 100
newline_style = "Unix"
use_field_init_shorthand = true
use_try_shorthand = true
reorder_imports = true
reorder_modules = true
use_small_heuristics = "Max"
# `imports_granularity` / `group_imports` require nightly rustfmt; keep stable CI green.
