# Project-wide rustfmt configuration.
#
# Only stable rustfmt options. Nightly-only options (imports_granularity,
# group_imports, wrap_comments, comment_width) are intentionally omitted so
# `cargo fmt` works identically on stable CI runners.

edition = "2021"
max_width = 100
newline_style = "Unix"
use_field_init_shorthand = true
use_try_shorthand = true
reorder_imports = true
reorder_modules = true
