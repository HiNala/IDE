name: CI

# Quality gate: `fmt` on Ubuntu; `clippy`, `test`, and `build --release` on
# Windows, Linux, and macOS. Linux runners have no display server — we compile
# and run tests (including `editor-app --dry-run` headless GPU init) but do not
# launch the full windowed binary in CI.
#
# Toolchain: `actions-rust-lang/setup-rust-toolchain@v1` reads `rust-toolchain.toml`.

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  no-emoji:
    name: no-emoji lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan Rust sources for emoji
        run: bash scripts/check-no-emoji.sh

  clippy:
    name: clippy / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy-${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libwayland-dev libxkbcommon-dev \
            libvulkan-dev mesa-vulkan-drivers \
            libasound2-dev pkg-config
      - name: MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    name: test / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libwayland-dev libxkbcommon-dev \
            libvulkan-dev mesa-vulkan-drivers \
            libasound2-dev pkg-config
      - name: MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - run: cargo test --workspace --all-features --locked
      - run: cargo build --release --workspace --locked

  docs:
    name: docs (rustdoc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs-ubuntu-latest
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libwayland-dev libxkbcommon-dev libvulkan-dev pkg-config
      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --all-features --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: deny-ubuntu
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources advisories
          log-level: warn

  bench-regression:
    name: bench regression (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      # Allow toolchain/bench output without `-D warnings` (workflow default).
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench-regression-ubuntu-latest
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libwayland-dev libxkbcommon-dev \
            libvulkan-dev mesa-vulkan-drivers pkg-config
      - name: Compare rope baseline (main) vs PR
        run: |
          set -euo pipefail
          HEAD_SHA="$(git rev-parse HEAD)"
          git fetch origin main
          git checkout origin/main
          cargo bench -p editor-core --bench rope_benches --locked -- insert_random_coherent_500 --save-baseline main
          git checkout "$HEAD_SHA"
          cargo bench -p editor-core --bench rope_benches --locked -- insert_random_coherent_500 --baseline main --save-baseline pr
          python3 scripts/bench_regression_gate.py
          cargo install critcmp --locked
          critcmp main pr -f insert_random_coherent_500 -t 10
