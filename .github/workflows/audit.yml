# Weekly + on-lockfile security audits: cargo-deny + cargo-audit.
name: Security Audit

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "audit-ubuntu"

      - name: Install cargo-deny and cargo-audit
        run: |
          cargo install cargo-deny cargo-audit --locked

      - name: cargo deny
        run: cargo deny check

      - name: cargo audit
        run: cargo audit
