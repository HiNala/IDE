# Dependabot configuration.
#
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Rust crate updates. Weekly cadence keeps noise low while staying current
  # enough that we don't drift into an unpatched-CVE zone.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "cargo"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Group patch-level bumps into a single PR to reduce merge friction.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions updates.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
