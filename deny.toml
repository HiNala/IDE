# cargo-deny configuration for the IDE workspace.
#
# Run locally with:
#     cargo install --locked cargo-deny
#     cargo deny check
#
# Not yet wired into CI blocking gates (added in a follow-up mission). This
# file exists so contributors can run supply-chain checks on demand and so
# that CI can opt in later without schema churn.
#
# Reference: https://embarkstudios.github.io/cargo-deny/

[graph]
# Check all dependency graph edges, including dev-deps and build-deps.
all-features        = true
no-default-features = false
targets = [
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
]

[output]
feature-depth = 1

###############################################################################
# Advisories — RUSTSEC vulnerability database
###############################################################################
[advisories]
version = 2
# We don't suppress any advisories by default; add IDs here with a short
# justification if something shows up that cannot be fixed immediately.
ignore = []

###############################################################################
# Licenses — permissive only
###############################################################################
[licenses]
version = 2
# Don't warn when a license in `allow` isn't used by any current crate; the
# list intentionally covers licenses we *will* accept as the dep graph grows.
unused-allowed-license = "allow"
# SPDX expressions of licenses we accept across the dependency graph.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9
# Crates without discoverable SPDX metadata can be whitelisted here; empty for now.
exceptions = []

###############################################################################
# Bans — block specific crates or multiple-version drift
###############################################################################
[bans]
multiple-versions       = "warn"
wildcards               = "deny"
# Internal workspace members are referenced by `{ path = "..." }` and have no
# published version; cargo-deny otherwise flags them as wildcard deps.
allow-wildcard-paths    = true
highlight               = "all"
workspace-default-features = "allow"
external-default-features  = "allow"
# Crates we will never allow in the graph.
deny = [
    # Add entries here like { crate = "openssl", reason = "use rustls instead" }.
]
# Skip multiple-version warnings for these common low-severity duplicates.
skip = []
skip-tree = []

###############################################################################
# Sources — only crates.io by default
###############################################################################
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
